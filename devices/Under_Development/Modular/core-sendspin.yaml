  listening_illustration_file: ${imagepath}/${imagemodel}/${imagewidth}x${imageheight}/listening.png
  thinking_illustration_file: ${imagepath}/${imagemodel}/${imagewidth}x${imageheight}/thinking.png
  replying_illustration_file: ${imagepath}/${imagemodel}/${imagewidth}x${imageheight}/replying.png
  error_illustration_file: ${imagepath}/${imagemodel}/${imagewidth}x${imageheight}/error.png
