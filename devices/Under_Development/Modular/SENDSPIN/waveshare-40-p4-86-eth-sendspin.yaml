substitutions:
  name: waveshare-40-p4-86-eth
  friendly_name: Waveshare 4.0

## Modular version Main SENDSPIN edition

## SETTINGS ######################################################################################################################################

  imagewidth:  "720"
  imageheight: "720"

  screenwidth:  "720"
  screenheight: "720"
  rotate_display: "0"

  startup_sound: "Home_Connected" # (options are: available, Home_Connected, Home_Connected_Male, Computer_Ready)
  wakeup_sound: "popup" # (options are: popup, wake_word_triggered)
  clock_background_image: "chip" # (options are: clock, hacker, mission, starrysky, waves, tron, chip, waterdrops)
  imagemodel: "Gwen" # options are: Gwen, Luffy, Dory, HA-character

# USE ONLINE OR LOCAL MODEL AND WALLPAPER IMAGES, IMAGES SHOULD BE PLACED IN: homeassistant/www/images/
  imagepath: "https://github.com/RealDeco/xiaozhi-esphome/raw/main/images"
#  imagepath: "http://homeassistant.local:8123/local/images/"

## PRESENCE / MOTION SENSORS ########## IF NOT USING THESE LEAVE THEM ALONE, SCRIPT WILL BREAK WITHOUT ###########################################

  sensor1_entity: "binary_sensor.room_1_presence"
  light1_entity: "binary_sensor.room_1_light"
  sensor1_label: "Room 1"

  sensor2_entity: "binary_sensor.room_2_presence"
  light2_entity: "binary_sensor.room_2_light"
  sensor2_label: "Room 2"

  sensor3_entity: "binary_sensor.room_3_presence"
  light3_entity: "binary_sensor.room_3_light"
  sensor3_label: "Room 3"

  sensor4_entity: "binary_sensor.room_4_presence"
  light4_entity: "binary_sensor.room_4_light"
  sensor4_label: "Room 4"

  sensor5_entity: "binary_sensor.room_5_presence"
  light5_entity: "binary_sensor.room_5_light"
  sensor5_label: "Room 5"

  weather_entity: "weather.forecast_home"

##################################################################################################################################################

  font_glyphsets: "GF_Latin_Core"
  font_family: Figtree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  name_add_mac_suffix: true
  project:
    name: realdeco.xiaozhi-esphome
    version: "2026.5.0"

esp32:
  board: esp32-p4-evboard
  flash_size: 32Mb
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

esp_ldo:
  - channel: 3
    voltage: 2.5V

esp32_hosted:
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

psram:
  speed: 200MHz

wifi:
  ap:

external_components:
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: dev
    components: [ improv_serial ]

improv_serial:

### USE MODULES FROM GITHUB (default) ############################################################################################################

packages:
  core:
    url: https://github.com/RealDeco/xiaozhi-esphome.git
    ref: main
    refresh: 0s
    files:
      - devices/Under_Development/Modular/core-sendspin.yaml
  hw:
    url: https://github.com/RealDeco/xiaozhi-esphome.git
    ref: main
    refresh: 0s
    files:
      - devices/Under_Development/Modular/HW/waveshare-40-p4-86-eth-sendspin_hw.yaml
  extcomp:
    url: https://github.com/RealDeco/xiaozhi-esphome.git
    ref: main
    refresh: 0s
    files:
      - devices/Under_Development/Modular/HW/sendspin-external_components.yaml

### USE LOCAL MODULES (read description https://github.com/RealDeco/xiaozhi-esphome/blob/main/devices/Under_Development/Modular/README.md) #######

#packages: # Local
#  core: !include localtest/core-sendspin.yaml
#  hw:   !include localtest/HW/waveshare-40-p4-86-eth-sendspin_hw.yaml
#  extcomp: !include localtest/HW/sendspin-external_components.yaml

### Debug logging, Uncomment ONLY if debugging, defaults to WARN
#logger:
#  level: DEBUG

## ENABLE / DISABLE WAKE WORDS ## IF LOW ON MEMORY, USE LESS WAKE WORDS ##########################################################################

