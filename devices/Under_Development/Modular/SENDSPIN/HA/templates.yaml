- binary_sensor:
    - name: "Room 1 Presence"
      unique_id: room_1_presence
      state: "{{ is_state('binary_sensor.8266_presense_2_presence', 'on') }}"

    - name: "Room 1 Light"
      unique_id: room_1_light
      state: "{{ is_state('light.livingroom_all_lights', 'on') }}"

    - name: "Room 2 Presence"
      unique_id: room_2_presence
