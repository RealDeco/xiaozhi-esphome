    - name: "Room 4 Presence"
      unique_id: room_4_presence
      state: "{{ is_state('binary_sensor.notifier_2_presence', 'on') }}"

    - name: "Room 4 Light"
      unique_id: room_4_light
      state: "{{ is_state('light.hue_toilet_light_light', 'on') }}"

    - name: "Room 5 Presence"
      unique_id: room_5_presence
