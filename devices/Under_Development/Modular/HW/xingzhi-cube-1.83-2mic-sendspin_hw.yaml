# xingzhi cube 1.83 2mic sendspin edition

# --- CLOCKS PACKAGE -----------------------------------------------------------
packages:
  clocks: !include ../clocks-standard.yaml

# --- EXTRA BUTTONS -------------------------------------------------------------
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      mode: INPUT_PULLUP
      inverted: true
    name: "Volume Down"
    id: volume_down
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

    on_click:
      min_length: 40ms
      max_length: 350ms
      then:
        - media_player.previous: sendspin_group_media_player

    on_press:
      then:
        - delay: 350ms
        - if:
            condition:
              binary_sensor.is_on: volume_down
            then:
              - script.execute: vol_down_repeat

    on_release:
      then:
        - script.stop: vol_down_repeat

  - platform: gpio
    pin:
      number: GPIO40
      mode: INPUT_PULLUP
      inverted: true
    name: "Volume Up"
    id: volume_up
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms

    on_click:
      min_length: 40ms
      max_length: 350ms
      then:
        - media_player.next: sendspin_group_media_player

    on_press:
      then:
        - delay: 350ms
        - if:
            condition:
              binary_sensor.is_on: volume_up
            then:
              - script.execute: vol_up_repeat

    on_release:
      then:
        - script.stop: vol_up_repeat

  - platform: gpio
    pin:
      number: 0
      mode: INPUT_PULLUP
      inverted: true
    id: !extend left_button
    on_multi_click:
      # Double click => Next track (only when PLAYING)
      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                lambda: |-
                  return id(voice_assistant_phase) == ${voice_assist_playing_phase_id};
              then:
                - media_player.next: sendspin_group_media_player

      # Triple click => Previous track (only when PLAYING)
      - timing:
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at most 350ms
          - ON for at most 350ms
          - OFF for at least 351ms
        then:
          - if:
              condition:
                lambda: |-
                  return id(voice_assistant_phase) == ${voice_assist_playing_phase_id};
              then:
                - media_player.previous: sendspin_group_media_player

      # Hold => phase-aware action (idle vs playing)
      - timing:
          - ON for at least 700ms
        then:
          - lambda: |-
              const auto phase = id(voice_assistant_phase);
              const bool playing = (phase == ${voice_assist_playing_phase_id});
              const bool idle    = (phase == ${voice_assist_idle_phase_id});
              if (!(playing || idle)) return;

              if (playing) {
                id(tap_playing_hold_action).execute();
              } else {  // idle
                id(tap_idle_hold_action).execute();
              }

  - platform: gpio
    pin: GPIO38
    name: "Battery Charging"

script:
  - id: mp_idle_debounce
    mode: restart
    then:
      - delay: 1s
      - if:
          condition:
            and:
              - media_player.is_idle: external_media_player
              - not:
                  voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

  - id: tap_playing_hold_action
    then:
      - media_player.toggle: sendspin_group_media_player

  - id: tap_idle_hold_action
    then:
      - media_player.toggle: sendspin_group_media_player

  - id: vol_up_repeat
    mode: restart
    then:
      - while:
          condition:
            binary_sensor.is_on: volume_up
          then:
            - media_player.volume_up: external_media_player
            - delay: 120ms

  - id: vol_down_repeat
    mode: restart
    then:
      - while:
          condition:
            binary_sensor.is_on: volume_down
          then:
            - media_player.volume_down: external_media_player
            - delay: 120ms

# --- SENDSPIN -----------------------------------------------------------------
globals:
  - id: sendspin_album_art_valid
    type: bool
    restore_value: no
    initial_value: "false"

  - id: gs_hold_fired
    type: bool
    restore_value: no
    initial_value: "false"

image:
  - file: ${imagepath}/${imagemodel}/240x240/playing.png
    id: !extend casita_playing
    resize: 240x240
    type: RGB565

generic_image:
  - platform: sendspin
    id: sendspin_album_art
    format: jpeg
    type: RGB565
    resize: 240x240
    source: ALBUM
    on_image_display:
      - lambda: |-
          id(sendspin_album_art_valid) = true;
      - component.update: main_display
    on_image_error:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - component.update: main_display

text_sensor:
  - platform: sendspin
    id: sendspin_title
    type: title
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - component.update: main_display

  - platform: sendspin
    id: sendspin_artist
    type: artist
    on_value:
      - lambda: |-
          id(sendspin_album_art_valid) = false;
      - component.update: main_display

# --- BUSES / PERIPHERALS ------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO12
    scl: GPIO11
    scan: true

spi:
  - id: spi_bus
    clk_pin: GPIO9
    mosi_pin: GPIO10
    # (no MISO line for display)

i2s_audio:
  - id: i2s_audio_bus # For speaker
    i2s_lrclk_pin: GPIO16
    i2s_bclk_pin: GPIO15
    i2s_mclk_pin: GPIO5

# --- AUDIO DEVICES ------------------------------------------------------------
switch:
  - platform: gpio
    name: Speaker Enable
    icon: "mdi:speaker"
    entity_category: config
    pin: GPIO4
    restore_mode: RESTORE_DEFAULT_ON

audio_adc:
  - platform: es7210
    i2c_id: bus_a
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    i2c_id: bus_a
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: i2s_audio_bus
    i2s_din_pin: GPIO7
    adc_type: external
    channel: left
    pdm: false
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO6
    dac_type: external
    audio_dac: es8311_dac
    sample_rate: 48000
    channel: mono

  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false

audio_file:
  - id: ready_sound
    file: ${startup_sound_file}
  - id: timer_finished_sound
    file: https://github.com/RealDeco/xiaozhi-esphome/raw/main/sounds/timer_finished.flac
  - id: wake_word_triggered_sound
    file: ${wakeup_sound_file}

media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
  - platform: audio_http
    id: http_media_source
    buffer_size: 100000
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player

  - platform: speaker_source
    id: external_media_player
    name: Media Player

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: 48000
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: 48000
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.5
    volume_max: 0.8

    on_announcement:
      - script.stop: mp_idle_debounce
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
                then:
                  - wait_until:
                      condition:
                        - not:
                            voice_assistant.is_running:

      - if:
          condition:
            lambda: 'return id(playing_internal_sound);'
          then:
            - lambda: 'id(playing_internal_sound) = false;'
          else:
            - script.execute: reset_screensaver
            - display.page.show: now_playing_page
            - component.update: main_display

    on_play:
      - script.stop: mp_idle_debounce
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
                then:
                  - wait_until:
                      condition:
                        - not:
                            voice_assistant.is_running:

      - if:
          condition:
            lambda: 'return id(playing_internal_sound);'
          then:
            - lambda: 'id(playing_internal_sound) = false;'
          else:
#            - script.execute: reset_screensaver
            - script.execute:
                id: set_phase
                phase: ${voice_assist_playing_phase_id}
            - display.page.show: now_playing_page
            - component.update: main_display

    on_pause:
      - lambda: |-
          ESP_LOGI("TOUCH", "ON_PAUSE fired");

    on_idle:
      - script.execute: mp_idle_debounce

# --- BACKLIGHT ----------------------------------------------------------------
output:
  - platform: ledc
    id: backlight_output
    pin: GPIO13
    inverted: false

light:
  - platform: monochromatic
    id: Sled
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

  - platform: esp32_rmt_led_strip
    id: led
    name: none
    disabled_by_default: false
    entity_category: config
    pin: GPIO48
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

# --- BATTERY ADC --------------------------------------------------------------
sensor:
  - platform: adc
    pin: GPIO17
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    accuracy_decimals: 2
    update_interval: 10s
    unit_of_measurement: "V"
    icon: mdi:battery-medium
    filters:
      - multiply: 2.0
      - median:
          window_size: 7
          send_every: 7
          send_first_at: 1
      - throttle: 1min
    on_value:
      then:
        - sensor.template.publish:
            id: battery_percentage
            state: !lambda 'return x;'

# --- DISPLAY DRIVER (SPI GC9A01A, 240x240 round) ------------------------------
display:
  - platform: mipi_spi
    id: main_display
    spi_id: spi_bus
    model: CUSTOM

    cs_pin: 14
    dc_pin: 8
    reset_pin: 18

    data_rate: 40MHz
    spi_mode: MODE0

    color_order: bgr
    invert_colors: true

    dimensions:
      height: ${imageheight}
      width: ${imagewidth}
      offset_width: 36
      offset_height: 0

    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true

    update_interval: 1s

    init_sequence:
      - [0xFD, 0x06, 0x08]
      - [0x61, 0x07, 0x04]
      - [0x62, 0x00, 0x44, 0x45]
      - [0x63, 0x41, 0x07, 0x12, 0x12]
      - [0x64, 0x37]
      - [0x65, 0x09, 0x10, 0x21]
      - [0x66, 0x09, 0x10, 0x21]
      - [0x67, 0x20, 0x40]
      - [0x68, 0x90, 0x4C, 0x7C, 0x66]
      - [0xB1, 0x0F, 0x02, 0x01]
      - [0xB4, 0x01]
      - [0xB5, 0x02, 0x02, 0x0A, 0x14]
      - [0xB6, 0x04, 0x01, 0x9F, 0x00, 0x02]
      - [0xDF, 0x11]
      - [0xE2, 0x13, 0x00, 0x00, 0x30, 0x33, 0x3F]
      - [0xE5, 0x3F, 0x33, 0x30, 0x00, 0x00, 0x13]
      - [0xE1, 0x00, 0x57]
      - [0xE4, 0x58, 0x00]
      - [0xE0, 0x01, 0x03, 0x0D, 0x0E, 0x0E, 0x0C, 0x15, 0x19]
      - [0xE3, 0x1A, 0x16, 0x0C, 0x0F, 0x0E, 0x0D, 0x02, 0x01]
      - [0xE6, 0x00, 0xFF]
      - [0xE7, 0x01, 0x04, 0x03, 0x03, 0x00, 0x12]
      - [0xE8, 0x00, 0x70, 0x00]
      - [0xEC, 0x52]
      - [0xF1, 0x01, 0x01, 0x02]
      - [0xF6, 0x09, 0x10, 0x00, 0x00]
      - [0xFD, 0xFA, 0xFC]
      - [0x35, 0x00]
      - [0x11]
      - delay 200ms
      - [0x29]
      - delay 10ms
    pages: !include ../display_pages-sendspin.yaml
