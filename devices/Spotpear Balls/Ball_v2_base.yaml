    hex: ${error_illustration_background_color}
  - id: active_timer_color
    hex: "26ed3a"
  - id: paused_timer_color
    hex: "3b89e3"
  - id: idle_dashboard_bg
    hex: ${idle_dashboard_background_color}
  - id: idle_dashboard_fg
    hex: ${idle_dashboard_text_color}
  - id: idle_temp_icon_color
    hex: "FF8A3D"
  - id: idle_humidity_icon_color
    hex: "4DA6FF"
  - id: idle_alarm_icon_color
    hex: "F7D154"
  - id: idle_battery_icon_color
    hex: "72D672"

spi:
  # Bus SPI del display redondo.
  - id: spi_bus
    clk_pin: GPIO${spi_clk_pin}
    mosi_pin: GPIO${spi_mosi_pin}

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
          then:
            - script.execute: draw_display
  - interval: 15s
    then:
      - if:
          condition:
            and:
              - wifi.connected:
              - api.connected:
              - switch.is_off: mute
              - lambda: return !id(night_mode_effective);
              - lambda: return !id(timer_ringing).state;
              - not:
                  voice_assistant.is_running:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
              - not:
                  media_player.is_announcing:
              - not:
                  speaker.is_playing:
              - lambda: return id(external_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_IDLE;
          then:
            - script.execute: start_wake_word

display:
  - platform: ili9xxx
    # Display circular con páginas dibujadas bajo demanda.
    id: s3_box_lcd
    model: ${displaymodel}
    invert_colors: ${invertcolors}
    data_rate: 40MHz
    cs_pin: GPIO${lcd_cs_pin}
    dc_pin: GPIO${lcd_dc_pin}
    reset_pin:
      number: GPIO${lcd_reset_pin}
#      inverted: false
    update_interval: never
    dimensions:
        height: ${imageheight}
        width: ${imagewidth}
    pages:
      - id: idle_page
        lambda: |-
          // Tras hablar se mantiene el avatar un instante y luego pasa a un panel
          // limpio con hora y datos sobre fondo configurable.
          bool show_avatar = static_cast<int32_t>(id(idle_avatar_until_ms) - millis()) > 0;
          if (show_avatar) {
            it.fill(id(idle_color));
            it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_idle), ImageAlign::CENTER);
            id(draw_status_badges).execute();
          } else {
            it.fill(id(idle_dashboard_bg));
            int current_y = 16;
            id(check_if_timers_active).execute();
            if (id(show_idle_temperature).state && !id(idle_temperature_text).state.empty()) {
              // Thermometer icon.
              it.filled_circle(66, current_y + 15, 4, id(idle_temp_icon_color));
              it.filled_rectangle(64, current_y + 5, 4, 11, id(idle_temp_icon_color));
              it.rectangle(63, current_y + 4, 6, 14, id(idle_temp_icon_color));
              it.printf(it.get_width() / 2, current_y, id(font_idle_metric), id(idle_dashboard_fg), TextAlign::TOP_CENTER, "%s", id(idle_temperature_text).state.c_str());
              current_y += 24;
            }
            if (id(show_idle_humidity).state && !id(idle_humidity_text).state.empty()) {
              // Water drop icon.
              it.filled_triangle(66, current_y + 5, 61, current_y + 15, 71, current_y + 15, id(idle_humidity_icon_color));
              it.filled_circle(66, current_y + 17, 5, id(idle_humidity_icon_color));
              it.printf(it.get_width() / 2, current_y, id(font_idle_metric), id(idle_dashboard_fg), TextAlign::TOP_CENTER, "%s", id(idle_humidity_text).state.c_str());
              current_y += 26;
            }
            if (id(show_idle_clock).state && id(ha_time).now().is_valid()) {
              auto now = id(ha_time).now();
              char time_text[6];
              snprintf(time_text, sizeof(time_text), "%02d:%02d", now.hour, now.minute);
              it.printf(it.get_width() / 2, 120, id(font_idle_clock), id(idle_dashboard_fg), TextAlign::CENTER, "%s", time_text);
            }
            if (id(global_is_timer_active)) {
              id(fetch_first_active_timer).execute();
              int hours_left = floor(id(global_first_active_timer).seconds_left / 3600);
              int minutes_left = floor((id(global_first_active_timer).seconds_left - hours_left * 3600) / 60);
              int seconds_left = id(global_first_active_timer).seconds_left - hours_left * 3600 - minutes_left * 60;
              auto display_hours = (hours_left < 10 ? "0" : "") + std::to_string(hours_left);
              auto display_minute = (minutes_left < 10 ? "0" : "") + std::to_string(minutes_left);
              auto display_seconds = (seconds_left < 10 ? "0" : "") + std::to_string(seconds_left);

              std::string display_string = "";
              if (hours_left > 0) {
                display_string = display_hours + ":" + display_minute;
              } else {
                display_string = display_minute + ":" + display_seconds;
              }
              it.printf(it.get_width() / 2, 160, id(font_idle_timer), id(idle_dashboard_fg), TextAlign::TOP_CENTER, "%s", display_string.c_str());
            } else if (id(show_idle_next_alarm).state &&
                !id(idle_next_alarm_text).state.empty()) {
              std::string alarm_text = id(idle_next_alarm_text).state;
              if (alarm_text.length() > 28) {
                alarm_text = alarm_text.substr(0, 28) + "...";
              }
              // Bell icon.
              it.filled_circle(42, 181, 2, id(idle_alarm_icon_color));
              it.filled_circle(42, 189, 6, id(idle_alarm_icon_color));
              it.filled_rectangle(37, 189, 10, 9, id(idle_alarm_icon_color));
              it.filled_circle(37, 197, 3, id(idle_alarm_icon_color));
              it.filled_circle(47, 197, 3, id(idle_alarm_icon_color));
              it.filled_rectangle(39, 196, 6, 3, id(idle_alarm_icon_color));
              it.filled_circle(42, 201, 2, id(idle_alarm_icon_color));
              it.printf(it.get_width() / 2, 177, id(font_idle_alarm), id(idle_dashboard_fg), TextAlign::TOP_CENTER, "%s", alarm_text.c_str());
            }
            if (!id(idle_battery_text).state.empty()) {
              // Battery icon.
              it.rectangle(70, 219, 18, 10, id(idle_battery_icon_color));
              it.filled_rectangle(88, 222, 2, 4, id(idle_battery_icon_color));
              it.filled_rectangle(72, 221, 12, 6, id(idle_battery_icon_color));
              it.printf(it.get_width() / 2, 212, id(font_battery), id(idle_dashboard_fg), TextAlign::TOP_CENTER, "%s", id(idle_battery_text).state.c_str());
            }
            id(draw_status_badges).execute();
          }
      - id: listening_page
        lambda: |-
          // Escuchando al usuario.
          it.fill(id(listening_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_listening), ImageAlign::CENTER);
          id(draw_status_badges).execute();
      - id: thinking_page
        lambda: |-
          // Procesando STT / esperando respuesta de HA.
          it.fill(id(thinking_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_thinking), ImageAlign::CENTER);
          if (id(show_text).state) {
            it.filled_rectangle(20 , 20 , 200 , 30 , Color::WHITE );
            it.rectangle(20 , 20 , 200 , 30 , Color::BLACK );
            it.printf(30, 25, id(font_request), Color::BLACK, "%s", id(text_request).state.c_str());
          }
          id(draw_status_badges).execute();
      - id: replying_page
        lambda: |-
          // Respondiendo con TTS y texto opcional.
          it.fill(id(replying_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_replying), ImageAlign::CENTER);
          int y_offset = 190; // default for 240px display
          if (it.get_height() == 320) {
            y_offset = 270; // Move box lower for 320px tall screens
          }
          if (id(show_text).state) {
            it.filled_rectangle(20, y_offset, 200, 30, Color::WHITE);
            it.rectangle(20, y_offset, 200, 30, Color::BLACK);
            it.printf(30, y_offset + 5, id(font_response), Color::BLACK, "%s", id(text_response).state.c_str());
          }
          id(draw_status_badges).execute();
      - id: timer_finished_page
        lambda: |-
          // Pantalla final cuando vence un temporizador.
          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_timer_finished), ImageAlign::CENTER);
          id(draw_status_badges).execute();
      - id: error_page
        lambda: |-
          // Error genérico del asistente.
          it.fill(id(error_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_error), ImageAlign::CENTER);
      - id: no_ha_page
        lambda: |-
          // Wi-Fi presente, pero sin conexión API a Home Assistant.
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_ha), ImageAlign::CENTER);
      - id: no_wifi_page
        lambda: |-
          // Sin conectividad Wi-Fi.
          it.image((it.get_width() / 2), (it.get_height() / 2), id(error_no_wifi), ImageAlign::CENTER);
      - id: initializing_page
        lambda: |-
          // Pantalla temporal durante el arranque inicial.
          it.fill(id(loading_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_initializing), ImageAlign::CENTER);
      - id: muted_page
        lambda: |-
          // Modo silenciado: avatar mute.
          it.fill(Color::BLACK);
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_muted), ImageAlign::CENTER);
          id(draw_status_badges).execute();
