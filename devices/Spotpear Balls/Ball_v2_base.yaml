text_sensor:
  - id: text_request
    platform: template
    on_value:
      # Limita el texto mostrado para que no rompa el layout del display.
      lambda: |-
        if(id(text_request).state.length()>32) {
          std::string name = id(text_request).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_request).state = (truncated+"...").c_str();
        }

  - id: text_response
    platform: template
    on_value:
      # Misma truncación para la respuesta TTS visible.
      lambda: |-
        if(id(text_response).state.length()>32) {
          std::string name = id(text_response).state.c_str();
          std::string truncated = esphome::str_truncate(name.c_str(),31);
          id(text_response).state = (truncated+"...").c_str();
        }

  - id: idle_battery_text
    platform: template
    internal: true
    on_value:
      then:
        - script.execute: draw_display

color:
  # Colores base por estado y colores de barras de temporizador.
